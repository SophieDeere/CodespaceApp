<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Grow2Go{% endblock %}</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,500;0,700;1,300&family=DM+Sans:wght@300;400;500&display=swap');

    :root {
      --green-dark: #2d4a2d;
      --green-mid: #4a7c4a;
      --green-light: #7ab57a;
      --green-pale: #e8f5e8;
      --green-mist: #f4faf4;
      --earth: #8b6914;
      --earth-light: #f5efe0;
      --text: #1a2e1a;
      --text-muted: #5a7a5a;
      --white: #ffffff;
      --border: #c8e0c8;
      --shadow: 0 2px 12px rgba(45, 74, 45, 0.08);
      --radius: 12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--green-mist);
      color: var(--text);
      min-height: 100vh;
    }

    /* NAV */
    nav {
      background: var(--green-dark);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      gap: 2rem;
      height: 60px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }

    .nav-brand {
      font-family: 'Fraunces', serif;
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--white);
      text-decoration: none;
      letter-spacing: -0.02em;
    }

    .nav-brand span { color: var(--green-light); }

    nav a {
      color: rgba(255,255,255,0.75);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 400;
      padding: 0.3rem 0.6rem;
      border-radius: 6px;
      transition: all 0.15s;
    }

    nav a:hover { color: white; background: rgba(255,255,255,0.1); }

    /* MAIN */
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }

    /* CARDS */
    .card {
      background: var(--white);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      padding: 1.5rem;
    }

    /* BUTTONS */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.5rem 1.1rem;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      border: none;
      transition: all 0.15s;
    }

    .btn-primary {
      background: var(--green-mid);
      color: white;
    }
    .btn-primary:hover { background: var(--green-dark); }

    .btn-secondary {
      background: var(--green-pale);
      color: var(--green-dark);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover { background: var(--border); }

    .btn-danger {
      background: #fef2f2;
      color: #dc2626;
      border: 1px solid #fecaca;
    }
    .btn-danger:hover { background: #fee2e2; }

    .btn-sm { padding: 0.3rem 0.7rem; font-size: 0.8rem; }

    /* FORMS */
    .form-group { margin-bottom: 1.2rem; }
    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 0.4rem;
    }
    input, select, textarea {
      width: 100%;
      padding: 0.6rem 0.9rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      color: var(--text);
      background: var(--white);
      transition: border 0.15s;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--green-mid);
      box-shadow: 0 0 0 3px rgba(74, 124, 74, 0.1);
    }

    /* PAGE HEADER */
    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
    }
    .page-title {
      font-family: 'Fraunces', serif;
      font-size: 1.8rem;
      font-weight: 500;
      color: var(--green-dark);
    }

    /* BADGE */
    .badge {
      display: inline-block;
      font-size: 0.72rem;
      font-weight: 500;
      padding: 0.2rem 0.6rem;
      border-radius: 99px;
      background: var(--green-pale);
      color: var(--green-dark);
    }
    .badge-earth {
      background: var(--earth-light);
      color: var(--earth);
    }

    /* MONTH BAR */
    .calendar-row {
      display: grid;
      grid-template-columns: 120px 1fr;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 0.5rem;
    }
    .calendar-label {
      font-size: 0.8rem;
      color: var(--text-muted);
      font-weight: 500;
    }
    .month-bar {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 2px;
      height: 20px;
    }
    .month-cell {
      border-radius: 3px;
      background: var(--green-pale);
      position: relative;
    }
    .month-cell.active { background: var(--green-mid); }
    .month-cell.active-gh { background: var(--earth); }
    .month-labels {
      display: grid;
      grid-template-columns: 120px 1fr;
      gap: 0.75rem;
      margin-bottom: 0.75rem;
    }
    .month-names {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 2px;
    }
    .month-names span {
      font-size: 0.65rem;
      color: var(--text-muted);
      text-align: center;
    }

    /* GRID */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; }

    @media (max-width: 600px) {
      .grid-2, .grid-3 { grid-template-columns: 1fr; }
      .page-header { flex-direction: column; align-items: flex-start; gap: 0.75rem; }
    }

    /* EMPTY STATE */
    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-muted);
    }
    .empty-state .icon { font-size: 3rem; margin-bottom: 1rem; }
    .empty-state p { margin-bottom: 1rem; }

    /* NEIGHBOR PILLS */
    .neighbor-good {
      display: inline-block;
      background: #dcfce7;
      color: #16a34a;
      border-radius: 99px;
      padding: 0.2rem 0.7rem;
      font-size: 0.8rem;
      margin: 0.2rem;
    }
    .neighbor-bad {
      display: inline-block;
      background: #fee2e2;
      color: #dc2626;
      border-radius: 99px;
      padding: 0.2rem 0.7rem;
      font-size: 0.8rem;
      margin: 0.2rem;
    }
  </style>
</head>
<body>
  <nav>
    <a href="{% url 'dashboard' %}" class="nav-brand">Grow<span>2</span>Go</a>
    <a href="{% url 'bed_list' %}">🛏 Meine Beete</a>
    <a href="{% url 'vegetable_list' %}">🌱 Gemüse</a>
  </nav>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>

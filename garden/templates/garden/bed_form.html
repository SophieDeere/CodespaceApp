{% extends "garden/base.html" %}
{% block title %}{{ title }} – Grow2Go{% endblock %}

{% block content %}
<div class="page-header">
  <h1 class="page-title">{{ title }}</h1>
  <a href="{% url 'bed_list' %}" class="btn btn-secondary">← Zurück</a>
</div>

<div class="card" style="max-width:560px;">
  <form method="post">
    {% csrf_token %}
    <div class="form-group">
      <label for="name">Name *</label>
      <input type="text" id="name" name="name" required
             value="{{ bed.name|default:'' }}" placeholder="z. B. Hochbeet Süd">
    </div>

    <div class="grid-2">
      <div class="form-group">
        <label for="bed_type">Typ *</label>
        <select id="bed_type" name="bed_type">
          {% for value, label in bed_type_choices %}
          <option value="{{ value }}"
            {% if bed and bed.bed_type == value %}selected{% endif %}>
            {{ label }}
          </option>
          {% endfor %}
        </select>
      </div>

      <div class="form-group">
        <label for="location">Lage *</label>
        <select id="location" name="location">
          {% for value, label in location_choices %}
          <option value="{{ value }}"
            {% if bed and bed.location == value %}selected{% endif %}>
            {{ label }}
          </option>
          {% endfor %}
        </select>
      </div>
    </div>

    <div class="form-group">
      <label for="size_sqm">Größe (m²) – optional</label>
      <input type="number" id="size_sqm" name="size_sqm" step="0.1" min="0"
             value="{{ bed.size_sqm|default:'' }}" placeholder="z. B. 4.5">
    </div>

    <div class="form-group">
      <label for="notes">Notizen – optional</label>
      <textarea id="notes" name="notes" rows="3"
                placeholder="z. B. windgeschützt, nahe Kompost">{{ bed.notes|default:'' }}</textarea>
    </div>

    <div style="display:flex; gap:0.75rem; margin-top:1.5rem;">
      <button type="submit" class="btn btn-primary">Speichern</button>
      <a href="{% url 'bed_list' %}" class="btn btn-secondary">Abbrechen</a>
    </div>
  </form>
</div>
{% endblock %}
